<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Model & Prompt Lab</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f1f5f9; padding: 30px; line-height: 1.6; }
        .container { max-width: 1000px; margin: 0 auto; background: #1e293b; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        h1 { margin-top: 0; color: #38bdf8; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .panel { background: #0f172a; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        label { display: block; font-size: 12px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 700; }
        textarea { width: 100%; height: 150px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: white; padding: 12px; font-family: monospace; resize: vertical; margin-bottom: 15px; }
        select, input { width: 100%; padding: 10px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: white; margin-bottom: 15px; }
        .actions { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: #38bdf8; color: #0f172a; }
        .btn-primary:hover { background: #7dd3fc; }
        .btn-secondary { background: #334155; color: white; }
        #results { margin-top: 20px; background: #000; padding: 20px; border-radius: 12px; font-family: monospace; font-size: 13px; max-height: 400px; overflow-y: auto; border: 1px solid #334155; }
        .track-card { background: #1e293b; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #38bdf8; }
        .track-info { flex: 1; }
        .track-meta { font-size: 11px; color: #94a3b8; margin-top: 4px; }
        .stats { display: flex; gap: 20px; margin-top: 15px; font-size: 14px; }
        .stat-item { background: #334155; padding: 5px 15px; border-radius: 20px; color: #38bdf8; font-weight: bold; }
        .error { color: #f87171; background: rgba(248, 113, 113, 0.1); padding: 10px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🧪 Gemini Model Lab</h1>
    <p style="color: #94a3b8; font-size: 14px;">Test prompts and model stability for pool filling. Results are NOT added to the live pool.</p>

    <div class="grid">
        <div class="panel">
            <label>Model Selection</label>
            <select id="modelId">
                <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash-Lite (Preview)</option>
                <option value="gemini-3-flash-preview">Gemini 3 Flash (Preview)</option>
                <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash-Lite</option>
            </select>

            <label>API Key (Optional Override)</label>
            <input type="password" id="apiKey" placeholder="Leave blank to use server key">

            <label>Target Track Count (Seeds)</label>
            <input type="number" id="count" value="5" min="1" max="100">

            <div style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="minimalist" style="width: auto; margin: 0;" checked>
                    <label for="minimalist" style="margin: 0; cursor: pointer;">Ultra-Fill Mode (Seed Objects Only)</label>
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="useTurbo" style="width: auto; margin: 0;" checked>
                    <label for="useTurbo" style="margin: 0; pointer: cursor; color: #fbbf24;">🚀 Use Turbo Key (Paid Tier)</label>
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="freshness" style="width: auto; margin: 0;">
                    <label for="freshness" style="margin: 0; cursor: pointer; color: #10b981;">🔥 Latest Hits (Freshness)</label>
                </div>
            </div>
        </div>

        <div class="panel">
            <label>System Instruction (Model Persona)</label>
            <textarea id="systemInstruction" style="height: 100px;">You are a legendary bar DJ. I need the absolute BEST, most iconic, and essential "Gold Standard" tracks for the requested vibe.
Return ONLY a JSON array of objects. 
Choose only the absolute top-tier tracks that define the genre.</textarea>
            
            <label>Temperature (Creativity)</label>
            <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 15px;">
                <input type="range" id="temperature" min="0" max="1" step="0.1" value="0.8" style="flex: 1; margin: 0;">
                <span id="tempVal" style="width: 30px; font-weight: bold; color: #38bdf8;">0.8</span>
            </div>

            <label>Custom Vibe Prompt</label>
            <textarea id="prompt">I need 5 Gold Standard tracks for this vibe: Organic House mixed with Chill Deep House.</textarea>
            
            <div class="actions">
                <button class="btn-primary" id="testBtn" onclick="runTest()">Run Benchmark</button>
                <button class="btn-secondary" onclick="clearResults()">Clear</button>
            </div>
        </div>
    </div>

    <div id="statsArea" class="stats" style="display:none">
        <div class="stat-item">Time: <span id="statTime">0s</span></div>
        <div class="stat-item">Tracks: <span id="statCount">0</span></div>
        <div class="stat-item">Tokens: <span id="statTokens">0</span></div>
        <div class="stat-item">Cost: $<span id="statCost">0.00</span></div>
        <div class="stat-item">Status: <span id="statStatus">Success</span></div>
    </div>

    <div id="results">
        <div style="color: #475569; text-align: center; padding: 40px;">Ready for testing...</div>
    </div>
</div>

<script>
    document.getElementById('temperature').addEventListener('input', (e) => {
        document.getElementById('tempVal').textContent = e.target.value;
    });

    async function runTest() {
        const modelId = document.getElementById('modelId').value;
        const apiKey = document.getElementById('apiKey').value;
        const count = document.getElementById('count').value;
        const prompt = document.getElementById('prompt').value;
        const minimalist = document.getElementById('minimalist').checked;
        const useTurbo = document.getElementById('useTurbo').checked;
        const freshness = document.getElementById('freshness').checked;
        let systemInstruction = document.getElementById('systemInstruction').value;

        if (minimalist) {
            systemInstruction += "\nCRITICAL: Return ONLY a JSON array of objects. \nFormat: {\"artist\": \"...\", \"title\": \"...\"}. \nDo NOT include BPM, Energy, or other metadata.";
        } else {
            systemInstruction += "\nCRITICAL: Return ONLY a JSON array of objects. \nFormat: {\"artist\", \"title\", \"bpm\", \"energy\", \"danceability\", \"valence\", \"musical_key\"}.";
        }

        const temperature = parseFloat(document.getElementById('temperature').value);
        const resultsEl = document.getElementById('results');
        const testBtn = document.getElementById('testBtn');

        resultsEl.innerHTML = `<div style="color: #38bdf8; text-align: center; padding: 40px;">🤖 Model [${modelId}] is thinking${useTurbo ? ' (🚀 Turbo)' : ''}${freshness ? ' (🔥 Fresh)' : ''}...</div>`;
        testBtn.disabled = true;
        document.getElementById('statsArea').style.display = 'none';

        const startTime = Date.now();

        try {
            const response = await fetch('/api/test/gemini', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ modelId, apiKey, count, prompt, systemInstruction, temperature, useTurbo, freshness })
            });

            const duration = ((Date.now() - startTime) / 1000).toFixed(2);
            const data = await response.json();

            if (!response.ok) throw new Error(data.error || 'Server error');

            document.getElementById('statsArea').style.display = 'flex';
            document.getElementById('statTime').textContent = duration + 's';
            document.getElementById('statCount').textContent = data.tracks?.length || 0;
            document.getElementById('statTokens').textContent = data.usage?.total || 0;
            document.getElementById('statCost').textContent = data.usage?.estimatedCost || '0.000000';
            document.getElementById('statStatus').textContent = 'Success';

            if (data.tracks && data.tracks.length > 0) {
                resultsEl.innerHTML = data.tracks.map(t => {
                    const meta = t.bpm ? `BPM: ${t.bpm} | Key: ${t.musical_key} | Energy: ${t.energy}` : `<span style="color:#64748b">Minimalist Mode</span>`;
                    return `
                        <div class="track-card">
                            <div class="track-info">
                                <strong>${t.artist} - ${t.title}</strong>
                                <div class="track-meta">${meta}</div>
                            </div>
                            <div style="color: #10b981; font-weight: bold;">✓</div>
                        </div>
                    `;
                }).join('');
            } else {
                resultsEl.innerHTML = `<div class="error">Model returned no tracks. Check server logs.</div>`;
            }

        } catch (err) {
            resultsEl.innerHTML = `<div class="error"><strong>Error:</strong> ${err.message}</div>`;
            document.getElementById('statsArea').style.display = 'flex';
            document.getElementById('statStatus').textContent = 'Failed';
            document.getElementById('statStatus').style.color = '#f87171';
        } finally {
            testBtn.disabled = false;
        }
    }

    function clearResults() {
        document.getElementById('results').innerHTML = `<div style="color: #475569; text-align: center; padding: 40px;">Ready for testing...</div>`;
        document.getElementById('statsArea').style.display = 'none';
    }
</script>

</body>
</html>

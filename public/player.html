<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jukebox — Premium Host Player</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #050505;
    --surface: #121212;
    --surface2: #1a1a1a;
    --accent: #ff0033;
    --accent-glow: rgba(255, 0, 51, 0.4);
    --text: #ffffff;
    --muted: #888888;
    --border: #222222;
    --red: #ff4d4d;
    --amber: #ffaa00;
    --glass: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.1);
  }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    overflow-x: hidden;
  }

  /* Ambient Background Glow */
  body::before {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
    transform: translate(-50%, -50%);
    z-index: -1;
    filter: blur(80px);
    opacity: 0.3;
    animation: pulseGlow 8s ease-in-out infinite alternate;
  }

  @keyframes pulseGlow {
    from { opacity: 0.2; transform: translate(-50%, -50%) scale(1); }
    to { opacity: 0.4; transform: translate(-50%, -50%) scale(1.2); }
  }

  .container { width: 100%; max-width: 800px; position: relative; }
  
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
  }
  
  .logo-area { display: flex; align-items: center; gap: 12px; }
  .logo-icon { font-size: 32px; filter: drop-shadow(0 0 10px var(--accent)); }
  .logo-text h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; margin: 0; text-align: left; }
  .logo-text p { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }

  /* Premium Player Stage */
  .player-wrapper {
    position: relative;
    width: 100%;
    border-radius: 24px;
    background: #000;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 0 1px var(--border);
    margin-bottom: 32px;
    overflow: hidden;
  }

  #player-stage {
    width: 100%;
    aspect-ratio: 16 / 9;
    position: relative;
    z-index: 1;
  }

  #yt-player-a, #yt-player-b { 
    position: absolute;
    top: 0;
    left: 0;
    width: 100%; 
    height: 100%; 
    opacity: 0;
    pointer-events: none;
    transition: opacity 1s ease-in-out;
  }
  #yt-player-a.active, #yt-player-b.active { 
    opacity: 1; 
    pointer-events: auto;
  }

  /* Glassmorphic Info Overlay */
  .player-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 30px;
    background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
    z-index: 2;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    pointer-events: none;
    transition: opacity 0.5s;
  }

  .track-info-premium {
    flex: 1;
    min-width: 0;
  }
  
  .badge {
    display: inline-block;
    padding: 4px 8px;
    background: var(--accent);
    color: white;
    font-size: 10px;
    font-weight: 900;
    text-transform: uppercase;
    border-radius: 4px;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .premium-title {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  }

  .premium-artist {
    font-size: 16px;
    color: var(--muted);
    font-weight: 500;
  }

  /* Preload Indicator */
  .preload-indicator {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,0,0,0.6);
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(10px);
    z-index: 3;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--muted);
    transition: all 0.3s;
  }
  .preload-indicator.ready { color: #00ff88; border-color: rgba(0, 255, 136, 0.3); }
  .preload-dot { width: 6px; height: 6px; border-radius: 50%; background: #333; }
  .preload-indicator.ready .preload-dot { background: #00ff88; box-shadow: 0 0 10px #00ff88; }

  /* Premium Controls Bar */
  .controls-bar {
    display: flex;
    align-items: center;
    gap: 20px;
    background: var(--surface);
    padding: 20px 24px;
    border-radius: 20px;
    border: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .main-np-art {
    width: 64px;
    height: 64px;
    border-radius: 12px;
    object-fit: cover;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  }

  .progress-area { flex: 1; }
  .time-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-family: monospace;
    color: var(--muted);
    margin-bottom: 8px;
  }
  
  .progress-bar-wrap {
    width: 100%;
    height: 6px;
    background: #222;
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }
  .progress-bar-fill {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s linear;
  }

  .action-buttons { display: flex; gap: 10px; }
  
  .icon-btn {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .icon-btn:hover { background: var(--border); transform: translateY(-2px); }
  .icon-btn.primary { background: var(--accent); border-color: var(--accent); }
  .icon-btn.primary:hover { opacity: 0.9; }

  /* Dashboard Grid */
  .dashboard-grid {
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: 24px;
  }

  .panel {
    background: var(--surface);
    border-radius: 24px;
    border: 1px solid var(--border);
    padding: 24px;
  }
  
  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .panel-title { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); }

  /* Queue Premium */
  .premium-queue-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px;
    border-radius: 16px;
    background: rgba(255,255,255,0.02);
    margin-bottom: 12px;
    transition: transform 0.2s;
  }
  .premium-queue-item:hover { transform: translateX(5px); background: rgba(255,255,255,0.04); }
  .q-rank { font-size: 12px; font-weight: 900; color: var(--muted); width: 20px; }
  .q-art { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; }
  .q-info { flex: 1; min-width: 0; }
  .q-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .q-artist { font-size: 12px; color: var(--muted); }
  .q-votes { font-size: 11px; font-weight: 800; color: var(--accent); background: rgba(255,0,51,0.1); padding: 4px 8px; border-radius: 8px; }

  /* Status Chips */
  .status-chips { display: flex; flex-direction: column; gap: 10px; }
  .chip {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface2);
    border-radius: 14px;
    font-size: 13px;
    font-weight: 600;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; }
  .status-dot.ok { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
  .status-dot.waiting { background: #555; }
  .status-dot.error { background: var(--red); box-shadow: 0 0 10px var(--red); }
  
  .log-panel {
    margin-top: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    height: 100px;
    overflow-y: auto;
    padding-right: 10px;
  }
  .log-panel div { margin-bottom: 4px; }
  
  /* Hidden Scrollbar */
  .log-panel::-webkit-scrollbar { width: 4px; }
  .log-panel::-webkit-scrollbar-track { background: transparent; }
  .log-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Mute/Vol slider */
  .vol-control { display: flex; align-items: center; gap: 12px; }
  input[type=range] {
    -webkit-appearance: none;
    background: #333;
    height: 4px;
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-scrollbar-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
  }

  .eq { display: flex; align-items: flex-end; }
  .eq span { background: var(--accent); border-radius: 2px; animation: eq 0.7s ease-in-out infinite alternate; }
  @keyframes eq { from { height: 4px; } to { height: 35px; } }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo-area">
      <div class="logo-icon">🎧</div>
      <div class="logo-text">
        <h1>PREMIUM HOST</h1>
        <p>Jukebox System v2.0</p>
      </div>
    </div>
    <div class="vol-control">
      <button id="muteBtn" class="icon-btn" onclick="toggleMute()">🔊</button>
      <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.8">
    </div>
  </div>

  <div class="player-wrapper">
    <div class="preload-indicator" id="preloadIndicator">
      <div class="preload-dot"></div>
      <span id="preloadStatus">Standby</span>
    </div>
    <div id="player-stage">
      <div id="yt-player-a"></div>
      <div id="yt-player-b"></div>
    </div>
    <div class="player-overlay" id="playerOverlay">
      <div class="track-info-premium">
        <div class="badge" id="npBadge">Playing Now</div>
        <div class="premium-title" id="npTitle">Waiting for tracks...</div>
        <div class="premium-artist" id="npArtist">The Jukebox is ready.</div>
      </div>
      <div class="eq" id="visualEq" style="height: 40px; gap: 4px; opacity: 0; transition: opacity 0.5s;">
        <span style="width: 5px; animation-duration: 0.5s;"></span>
        <span style="width: 5px; animation-duration: 0.8s;"></span>
        <span style="width: 5px; animation-duration: 0.6s;"></span>
        <span style="width: 5px; animation-duration: 0.7s;"></span>
        <span style="width: 5px; animation-duration: 0.4s;"></span>
      </div>
    </div>
  </div>

  <div class="controls-bar">
    <img id="npArt" src="" class="main-np-art" alt="">
    <div class="progress-area">
      <div class="time-info">
        <span id="currentTime">0:00</span>
        <span id="totalTime">0:00</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>
    </div>
    <div class="action-buttons">
      <button class="icon-btn primary" onclick="togglePlay()" id="playPauseBtn">⏸</button>
      <button class="icon-btn" onclick="jumpToLastTenSeconds()" title="Skip to End">⏭</button>
    </div>
  </div>

  <div class="dashboard-grid">
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">Upcoming Queue</div>
        <div class="q-votes" id="queueCount">0 Tracks</div>
      </div>
      <div id="queuePreview"></div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">System Status</div>
      </div>
      <div class="status-chips">
        <div class="chip">
          <div class="status-dot waiting" id="playerDot"></div>
          <span id="playerLabel">Player Engine</span>
        </div>
        <div class="chip">
          <div class="status-dot waiting" id="socketDot"></div>
          <span id="socketLabel">Server Link</span>
        </div>
        <div class="chip" id="djChip" style="display:none">
          <div class="status-dot waiting" id="djDot"></div>
          <span id="djLabel">AI DJ Off</span>
        </div>
        <div class="chip" id="audioChip" style="background: var(--accent); color: white; cursor: pointer; display: flex;" onclick="unlockAudio()">
          <span>👆 Unlock Audio Output</span>
        </div>
      </div>
      <div class="log-panel" id="log"></div>
    </div>
  </div>
</div>

<script>
  // ─── Global State ─────────────────────────────────────────────────────────
  let playerA, playerB, activePlayer, standbyPlayer;
  let playerAReady = false, playerBReady = false, ytPlayerReady = false;
  let socket, hostId = (() => {
    let id = sessionStorage.getItem('jukebox_host_id') || 'host_' + Math.random().toString(36).slice(2, 10);
    sessionStorage.setItem('jukebox_host_id', id);
    return id;
  })();

  let isHostOwner = false, audioUnlocked = false, playbackCommandInFlight = false;
  let actualTrack = null, targetTrack = null, upcomingTrack = null;
  let currentBaseVolume = 0.8, djDuckingMultiplier = 1.0;
  let aiDjEnabled = false, aiDjVoice = 'Zephyr', geminiApiKey = null, aiDjWs = null;
  let audioContext = null, nextStartTime = 0, djStopDuckingTimer = null;
  let lastDjIntroForTrackId = null, lastNextRequestTrackId = null;

  const CROSSFADE_DURATION_MS = 8000, PRELOAD_AHEAD_MS = 12000, FADE_IN_DURATION_MS = 3000, FADE_STEP_MS = 80;
  let crossfadeTimer = null, crossfadeInProgress = false, standbyPreloadedTrackId = null;

  // ─── YouTube Setup ────────────────────────────────────────────────────────
  window.onYouTubeIframeAPIReady = () => {
    const config = (id, onReady) => ({
      height: '100%', width: '100%',
      playerVars: { autoplay: 1, controls: 0, disablekb: 1, fs: 0, rel: 0, vq: 'hd1080', origin: window.location.origin },
      events: {
        onReady,
        onStateChange: e => { if ((id === 'A' ? playerA : playerB) === activePlayer) onYTStateChange(e); },
        onError: e => {
          const p = id === 'A' ? playerA : playerB;
          if (p === activePlayer) onYTError(e);
          else if (p === standbyPlayer && [101, 150].includes(e.data)) resolveStandbyAlternate(upcomingTrack, e.data);
        }
      }
    });
    playerA = new YT.Player('yt-player-a', config('A', () => { playerAReady = true; if (playerBReady) onBothReady(); }));
    playerB = new YT.Player('yt-player-b', config('B', () => { playerBReady = true; if (playerAReady) onBothReady(); }));
  };

  function onBothReady() {
    activePlayer = playerA; standbyPlayer = playerB;
    document.getElementById('yt-player-a').classList.add('active');
    ytPlayerReady = true;
    setStatus('playerLabel', 'playerDot', 'ok', 'Player Engine Ready');
    log('YouTube Players initialized');
    maybeStartPlayback();
  }

  function onYTStateChange(e) {
    if (e.data === YT.PlayerState.ENDED && !crossfadeInProgress) {
        log('Track ended — requesting next');
        requestNextTrack();
    }
    if (e.data === YT.PlayerState.PLAYING) {
      document.getElementById('playPauseBtn').textContent = '⏸';
      const activeId = activePlayer === playerA ? 'yt-player-a' : 'yt-player-b';
      const standbyId = activePlayer === playerA ? 'yt-player-b' : 'yt-player-a';
      document.getElementById(activeId).classList.add('active');
      document.getElementById(standbyId).classList.remove('active');
    } else if (e.data === YT.PlayerState.PAUSED) {
        document.getElementById('playPauseBtn').textContent = '▶';
    }
  }

  async function onYTError(e) {
    log(`YouTube player error: ${e.data}`);
    if ([101, 150].includes(e.data) && actualTrack?.trackId) {
      log(`Resolving alternate for: ${actualTrack.title}`);
      try {
        const res = await fetch('/api/resolve-alternate', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ trackId: actualTrack.trackId, title: actualTrack.title, artist: actualTrack.artist, failedIds: [actualTrack.trackId] })
        });
        if (res.ok) { const { trackId } = await res.json(); ytPlay({ ...actualTrack, trackId }); return; }
      } catch (err) { log(`Resolve failed: ${err.message}`); }
    }
    requestNextTrack();
  }

  async function resolveStandbyAlternate(track, code) {
    log(`Preload error ${code} — finding alternate for "${track.title}"`);
    try {
      const res = await fetch('/api/resolve-alternate', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ trackId: track.trackId, title: track.title, artist: track.artist, failedIds: [track.trackId] })
      });
      if (res.ok) {
        const { trackId } = await res.json();
        log(`Preload alternate found: ${trackId}`);
        if (upcomingTrack?.trackId === track.trackId) upcomingTrack.trackId = trackId;
        standbyPreloadedTrackId = trackId;
        standbyPlayer.loadVideoById(trackId);
        setPlayerVolume(standbyPlayer, 0);
      }
    } catch (err) { log(`Preload resolve error: ${err.message}`); }
  }

  // ─── Playback Engine ──────────────────────────────────────────────────────
  function setPlayerVolume(p, v) { try { p.setVolume(Math.round(v * djDuckingMultiplier * 100)); } catch (e) {} }
  function ytSetVolume(v) { currentBaseVolume = v; if (!crossfadeInProgress) setPlayerVolume(activePlayer, v); }

  async function ytPlay(track, opts = {}) {
    if (!ytPlayerReady || !track?.trackId || !audioUnlocked || playbackCommandInFlight) return;
    playbackCommandInFlight = true;
    try {
      log(`Loading track: ${track.title}`);
      if (crossfadeTimer) { clearInterval(crossfadeTimer); crossfadeTimer = null; crossfadeInProgress = false; }
      standbyPreloadedTrackId = null;
      try { standbyPlayer.stopVideo(); } catch(e){}
      
      setPlayerVolume(activePlayer, 0);
      actualTrack = { ...track };
      activePlayer.loadVideoById(track.trackId);
      renderNowPlaying(track);
      
      const activeId = activePlayer === playerA ? 'yt-player-a' : 'yt-player-b';
      const standbyId = activePlayer === playerA ? 'yt-player-b' : 'yt-player-a';
      document.getElementById(activeId).classList.add('active');
      document.getElementById(standbyId).classList.remove('active');

      const start = Date.now();
      const timer = setInterval(() => {
        const p = Math.min(1, (Date.now() - start) / FADE_IN_DURATION_MS);
        setPlayerVolume(activePlayer, currentBaseVolume * p);
        if (p >= 1) clearInterval(timer);
      }, FADE_STEP_MS);
      await fetch('/api/host/ack', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...track, ...opts }) });
    } finally { playbackCommandInFlight = false; }
  }

  function maybeStartPlayback() { if (isHostOwner && ytPlayerReady && audioUnlocked && targetTrack && actualTrack?.trackId !== targetTrack.trackId) ytPlay(targetTrack); }

  async function unlockAudio() {
    try {
      if (!audioContext) { 
          audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 }); 
          nextStartTime = audioContext.currentTime; 
      }
      if (audioContext.state === 'suspended') await audioContext.resume();
      activePlayer.playVideo(); await new Promise(r => setTimeout(r, 300)); activePlayer.pauseVideo();
      audioUnlocked = true; 
      document.getElementById('audioChip').style.display = 'none'; 
      log('Audio system unlocked ✓'); 
      maybeStartPlayback();
    } catch (e) { log('Unlock failed: ' + e.message); }
  }

  function pollProgress() {
    if (!ytPlayerReady || !activePlayer) return;
    try {
      const pos = activePlayer.getCurrentTime() * 1000, dur = activePlayer.getDuration() * 1000;
      document.getElementById('currentTime').textContent = formatTime(pos);
      document.getElementById('totalTime').textContent = formatTime(dur);
      document.getElementById('progressBar').style.width = (dur > 0 ? (pos / dur) * 100 : 0) + '%';
      
      const rem = dur - pos;
      
      // Phase 1: Pre-load
      if (rem <= PRELOAD_AHEAD_MS && upcomingTrack && standbyPreloadedTrackId !== upcomingTrack.trackId && !crossfadeInProgress) {
        standbyPreloadedTrackId = upcomingTrack.trackId;
        log(`⏩ Preloading "${upcomingTrack.title}"`);
        setPlayerVolume(standbyPlayer, 0); 
        standbyPlayer.loadVideoById(upcomingTrack.trackId);
        updatePreloadUI('Buffering...');
      }
      
      // Phase 2: Signal Ready
      if (standbyPreloadedTrackId === upcomingTrack?.trackId && standbyPlayer.getPlayerState() === 5) {
          updatePreloadUI('Ready', true);
      }
      
      // Phase 3: Crossfade
      if (rem <= CROSSFADE_DURATION_MS && upcomingTrack && standbyPreloadedTrackId === upcomingTrack.trackId && !crossfadeInProgress) {
        crossfadeInProgress = true; 
        const next = { ...upcomingTrack };
        log(`🎚 Crossfading to "${next.title}"`);
        updatePreloadUI('Fading...', true); 
        standbyPlayer.playVideo();

        // AI DJ Intro
        if (aiDjEnabled && lastDjIntroForTrackId !== next.trackId) {
          lastDjIntroForTrackId = next.trackId;
          log(`🎙 AI DJ: Generating intro for "${next.title}"...`);
          let p = `Give us a smooth, authoritative intro for '${next.title}' by ${next.artist}. MAX 30 words. Be Afroman: deep voice, rhythmic West Coast flow, no chuckling, just pure smooth confidence. Make it hit.`;
          if (aiDjWs?.readyState === 1) aiDjWs.send(JSON.stringify({ realtimeInput: { text: p } }));
        }

        const start = Date.now();
        crossfadeTimer = setInterval(() => {
          const p = Math.min(1, (Date.now() - start) / CROSSFADE_DURATION_MS);
          setPlayerVolume(activePlayer, currentBaseVolume * (1 - p)); 
          setPlayerVolume(standbyPlayer, currentBaseVolume * p);
          
          if (p >= 1) {
            clearInterval(crossfadeTimer); 
            crossfadeTimer = null;
            setPlayerVolume(activePlayer, 0); 
            try { activePlayer.stopVideo(); } catch(e){}
            
            // Swap players
            const old = activePlayer; 
            activePlayer = standbyPlayer; 
            standbyPlayer = old;
            
            // Update UI & State
            actualTrack = next; 
            crossfadeInProgress = false; 
            standbyPreloadedTrackId = null;
            
            const activeId = activePlayer === playerA ? 'yt-player-a' : 'yt-player-b';
            const standbyId = activePlayer === playerA ? 'yt-player-b' : 'yt-player-a';
            document.getElementById(activeId).classList.add('active');
            document.getElementById(standbyId).classList.remove('active');

            updatePreloadUI('Standby'); 
            renderNowPlaying(next);
            log(`✓ Now playing: ${next.title}`);
            
            fetch('/api/host/ack', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...next, naturalAdvance: true }) });
          }
        }, FADE_STEP_MS);
      }
    } catch(e){}
  }

  // ─── Rendering ────────────────────────────────────────────────────────────
  function renderNowPlaying(t) {
    if (!t) return;
    document.getElementById('npTitle').textContent = t.title;
    document.getElementById('npArtist').textContent = t.artist;
    document.getElementById('npArt').src = t.albumArt || '';
    document.getElementById('npBadge').textContent = t.isFallback ? 'Autoplay' : 'Playing Now';
    document.getElementById('npBadge').style.background = t.isFallback ? 'var(--amber)' : 'var(--accent)';
    document.title = `▶ ${t.title} — Jukebox`;
  }

  function renderQueue(q) {
    document.getElementById('queueCount').textContent = `${q.length} Tracks`;
    document.getElementById('queuePreview').innerHTML = q.slice(0, 5).map((item, i) => `
      <div class="premium-queue-item"><div class="q-rank">${i + 1}</div><img class="q-art" src="${item.albumArt || ''}">
      <div class="q-info"><div class="q-title">${item.title}</div><div class="q-artist">${item.artist}</div></div>
      <div class="q-votes">▲ ${item.votes}</div></div>`).join('') || '<p style="color:var(--muted); font-size:13px; text-align:center; padding: 20px;">Queue is currently empty.</p>';
  }

  // ─── Socket & AI DJ ───────────────────────────────────────────────────────
  socket = io();
  socket.on('connect', () => { setStatus('socketLabel', 'socketDot', 'ok', 'Server Connected'); socket.emit('registerHost', { hostId }); });
  socket.on('hostAccepted', () => { isHostOwner = true; log('Host control claimed ✓'); fetch('/api/device', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ hostId }) }); maybeStartPlayback(); });
  socket.on('queueUpdate', d => {
    aiDjEnabled = d.aiDjEnabled; aiDjVoice = d.aiDjVoice; geminiApiKey = d.geminiApiKey;
    if (aiDjEnabled) connectAiDj(); else if (aiDjWs) { aiDjWs.close(); aiDjWs = null; }
    renderQueue(d.queue); targetTrack = d.targetTrack; upcomingTrack = d.queue[0];
    if (targetTrack && actualTrack?.trackId !== targetTrack.trackId) maybeStartPlayback();
  });

  function connectAiDj() {
    if (aiDjWs || !aiDjEnabled || !geminiApiKey) return;
    document.getElementById('djChip').style.display = 'flex';
    setStatus('djLabel', 'djDot', 'waiting', `AI DJ: Connecting...`);
    aiDjWs = new WebSocket(`wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent?key=${geminiApiKey}`);
    aiDjWs.binaryType = 'arraybuffer';
    aiDjWs.onopen = () => {
      log(`🎙 AI DJ: Online (${aiDjVoice})`);
      setStatus('djLabel', 'djDot', 'ok', `AI DJ: ${aiDjVoice} Online`);
      const inst = "You are Afroman. Your voice is deep, smooth, and legendary. Speak with a lazy but authoritative West Coast rhythmic cadence. NO chuckling, NO 'heh-heh'. Just pure, cool confidence. PHONETIC CUES: Use deep resonance, relaxed but clear enunciation. CRITICAL: Keep it engaging but professional. Aim for 2-3 short, impactful sentences. Keep it under 15 seconds. Pure smooth authority.";
      aiDjWs.send(JSON.stringify({ setup: { model: 'models/gemini-3.1-flash-live-preview', generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: aiDjVoice } } } }, systemInstruction: { parts: [{ text: inst }] } } }));
    };
    aiDjWs.onmessage = async e => {
      try {
        let d = e.data; if (d instanceof ArrayBuffer) d = new TextDecoder().decode(d);
        const r = JSON.parse(d);
        const p = r.serverContent?.modelTurn?.parts || r.server_content?.model_turn?.parts;
        if (p) p.forEach(item => { const audio = item.inlineData?.data || item.inline_data?.data; if (audio) playAudioChunk(audio); });
      } catch(err){}
    };
    aiDjWs.onclose = () => { setStatus('djLabel', 'djDot', 'waiting', 'AI DJ Off'); aiDjWs = null; if (aiDjEnabled) setTimeout(connectAiDj, 5000); };
  }

  function playAudioChunk(base64) {
    if (!audioContext || !audioUnlocked) return;
    const bin = atob(base64), f32 = new Float32Array(bin.length / 2);
    for (let i = 0; i < f32.length; i++) { const s = (bin.charCodeAt(i*2) | (bin.charCodeAt(i*2+1) << 8)); f32[i] = (s >= 0x8000 ? s - 0x10000 : s) / 32768.0; }
    const buf = audioContext.createBuffer(1, f32.length, 24000), src = audioContext.createBufferSource();
    buf.getChannelData(0).set(f32); src.buffer = buf; src.connect(audioContext.destination);
    const start = Math.max(nextStartTime, audioContext.currentTime); src.start(start); nextStartTime = start + buf.duration;
    if (nextStartTime > audioContext.currentTime) {
      document.getElementById('visualEq').style.opacity = 1; 
      djDuckingMultiplier = 0.3; 
      if (!crossfadeInProgress) setPlayerVolume(activePlayer, currentBaseVolume);
      if (djStopDuckingTimer) clearTimeout(djStopDuckingTimer);
      djStopDuckingTimer = setTimeout(() => { 
          document.getElementById('visualEq').style.opacity = 0; 
          djDuckingMultiplier = 1.0; 
          if (!crossfadeInProgress) setPlayerVolume(activePlayer, currentBaseVolume); 
      }, (nextStartTime - audioContext.currentTime) * 1000 + 100);
    }
  }

  // ─── Controls & Utilities ─────────────────────────────────────────────────
  function log(m) { const el = document.getElementById('log'); el.innerHTML += `<div>${new Date().toLocaleTimeString()} — ${m}</div>`; el.scrollTop = el.scrollHeight; }
  function setStatus(l, d, s, t) { document.getElementById(l).textContent = t; const dot = document.getElementById(d); dot.className = 'status-dot ' + (s === 'ok' ? 'ok' : s === 'error' ? 'error' : 'waiting'); }
  function formatTime(ms) { const s = Math.floor(ms / 1000); return Math.floor(s / 60) + ':' + (s % 60).toString().padStart(2, '0'); }
  function togglePlay() { const s = activePlayer.getPlayerState(); if (s === 1 || s === 3) { activePlayer.pauseVideo(); } else activePlayer.playVideo(); }
  function jumpToLastTenSeconds() { const d = activePlayer.getDuration(); if (d) activePlayer.seekTo(Math.max(0, d - 10), true); }
  function toggleMute() { const s = document.getElementById('volumeSlider'); if (isMuted) { ytSetVolume(0.8); s.value = 0.8; isMuted = false; document.getElementById('muteBtn').textContent = '🔊'; } else { ytSetVolume(0); s.value = 0; isMuted = true; document.getElementById('muteBtn').textContent = '🔇'; } }
  let isMuted = false; 

  // Volume Slider Listener
  document.getElementById('volumeSlider').addEventListener('input', e => ytSetVolume(parseFloat(e.target.value)));
  
  setInterval(pollProgress, 250);
  function updatePreloadUI(s, r = false) { const el = document.getElementById('preloadIndicator'), lbl = document.getElementById('preloadStatus'); lbl.textContent = s; if (r) el.classList.add('ready'); else el.classList.remove('ready'); }
  async function requestNextTrack() { if (!crossfadeInProgress && lastNextRequestTrackId !== actualTrack?.trackId) { lastNextRequestTrackId = actualTrack?.trackId; await fetch('/api/next', { method: 'POST' }); } }
</script>
<script src="https://www.youtube.com/iframe_api" async></script>
